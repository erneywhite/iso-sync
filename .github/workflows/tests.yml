name: Tests

# Запускает самописный test-runner (`php tests/run.php`) на матрице
# PHP-версий, которые мы официально поддерживаем (см. README → Требования).
# Это не реальный интеграционный прогон (мы не качаем ISO в CI), а
# проверка чистой логики: парсер SHA256SUMS, кэш хэшей, валидация конфига,
# резолвер family-шаблонов, генератор папок discovery.

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'config/iso-list.schema.json'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json, mbstring
          coverage: none
          tools: none

      - name: Verify PHP version
        run: php -v

      - name: Run tests
        run: php tests/run.php
